<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMMON KG Demo Login Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f8f3;
      margin: 0;
      padding: 40px 20px;
    }
    .box {
      max-width: 420px;
      margin: 60px auto;
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      color: #2f7d32;
      margin-top: 0;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      background: #2f7d32;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .hidden {
      display: none;
    }
    .error {
      color: #b91c1c;
      margin-top: 10px;
      font-size: 14px;
    }
    .app {
      max-width: 900px;
      margin: 30px auto;
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
  <div id="loginScreen" class="box">
    <h1>🌿 AMMON KG Grünwissen</h1>
    <p>Bitte mit Demo-Passwort einloggen.</p>
    <input id="password" type="password" placeholder="Passwort eingeben" />
    <button onclick="login()">Einloggen</button>
    <div id="errorMsg" class="error hidden">Falsches Passwort. Demo-Passwort: ammon2026</div>
  </div>

  <div id="appScreen" class="app hidden">
    <h1>Willkommen in der Demo</h1>
    <p>Der Login funktioniert. Als Nächstes können wir die volle Version wieder einbauen.</p>
    <button onclick="logout()" style="max-width:220px;">Logout</button>
  </div>

  <script>
    const DEMO_PASSWORD = "ammon2026";

    function login() {
      const value = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      if (value === DEMO_PASSWORD) {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("appScreen").classList.remove("hidden");
        errorMsg.classList.add("hidden");
      } else {
        errorMsg.classList.remove("hidden");
      }
    }

    function logout() {
      document.getElementById("appScreen").classList.add("hidden");
      document.getElementById("loginScreen").classList.remove("hidden");
      document.getElementById("password").value = "";
    }

    document.getElementById("password").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        login();
      }
    });
  </script>
</body>
</html>
